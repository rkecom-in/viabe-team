# Same-name disambiguation: a city that exists outside India resolves to tier_3
# UNLESS an in-region state is given. (e.g. Hyderabad: Telangana = tier_1;
# Sindh [Pakistan] = tier_3.) No state given → assume the Indian city.
disambiguation:
  hyderabad:
    allowed_states: [telangana, andhra pradesh]
