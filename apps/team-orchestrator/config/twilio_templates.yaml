# twilio_templates.yaml — name -> Twilio Content API content_sid mapping (VT-3.3c).
#
# Pillar 8: template *content* lives in the Twilio Console + the Meta WABA.
# This file is a name->sid lookup only — no copy, no logic.
#
# audience is informational for VT-3.3c (all sends go to tenant.whatsapp_number
# / the inbound sender). VT-6 routes owner-audience sends to a separate inbox.
#
# A template with `content_sid: null` is the stub-pending-approval path —
# send_template_message returns success=False / error_code=template_not_yet_approved
# without calling Twilio. Supported; no entry uses it today.

