# --- VT-369 Gap-5 agent-surface templates (plan §3c). 5 entries, en+hi. ---
# F1 ARMED (VT-383 / CL-438, 2026-06-12): all 10 SIDs (5 templates x en/hi) wired and
# Meta-APPROVED (Content-API canary: every meta_status == 'approved'). resolve() now
# returns the real content_sid; the send path is live for these names.
#
# `category` is the Gap-5 registry field (plan gate #2 / MED-1): the deterministic agent
# customer-send choke point (`agents/customer_send.py`) requires category:
# customer_marketing — owner-facing surfaces are owner_notification and can structurally
# never pass that gate.
#
# Both winbacks carry the customer STOP opt-out line in the FIXED Meta body (registry pin
# `optout_line: true`; the canary asserted STOP against the APPROVED body in both langs).
# `team_winback_offer` is `money_bearing: true` — always-confirm floor, never L3 auto-send
# (plan §5.5). Per-language `body_sha256` pins are the APPROVED-body hash fetched once via
# the Twilio Content API (VT-383 canary; .viabe/queue/VT-383-canary-results.json is canon);
# CI fails on any doc/yaml/Meta drift (plan §3c folded Critic-1 Probe 5).
#
# agent_selectable: the two `team_winback_*` are now TRUE (Meta-approved + SIDs wired →
# they belong in approved_template_names() / the live VT-45 selectable set). The three
# owner_notification surfaces stay FALSE forever — system-invoked, never agent-chosen.

team_winback_simple:
  audience: customer
  category: customer_marketing  # Meta MARKETING category (F1 submission)
  agent_selectable: true        # F1 armed (VT-383/CL-438): Meta-APPROVED, SIDs wired
  optout_line: true             # STOP line lives in the fixed approved body
  variables:
    - customer_name   # {{1}} — display-name-level PII max (no E.164; CI-pinned)
    - business_name   # {{2}}
  languages:
    en: HX601925a292da89e9d00d3fdf8742f765  # VT-383 F1 (CL-438); Meta approved
    hi: HX5da4406f8a6691f52555cd179f40be73  # VT-383 F1 (CL-438); Meta approved
  body_sha256:  # pinned from the Twilio Content API APPROVED body (VT-383 canary)
    en: 15edf62d44cfc28b478a9b589529a9fa6cf0b7367622fbfeb23ab1ad63a4d740
    hi: d32d3a974cb63b78cb505430cd465f62bed597f02056646c270ba92a47163dc4

