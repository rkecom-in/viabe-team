name: CI

on:
  pull_request:
    branches: [main]
    # VT-255 Actions-diet: dropped `edited` — a PR title/body edit must NOT
    # re-run the ~17-job suite (CL-423 numeric-title churn fired it constantly).
    # The cheap title gate lives in pr-title.yml, which still runs on `edited`.
    types: [opened, synchronize, reopened]
    # VT-245 trigger-diet: skip the 17-job suite when a PR touches ONLY
    # non-code paths (docs, sprint substrate, Cowork session exports, or
    # the deploy-dev workflow — which CI never tests). paths-ignore only
    # skips when EVERY changed file matches; a mixed code+docs PR still
    # runs. main's ruleset has "Require status checks to pass" OFF
    # (2026-05-30), so a skipped run does NOT block merge.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.viabe/**'
      - 'cowork_sessions/**'
      - '.github/workflows/deploy-dev.yml'

# CI runs on pull_request only (no push trigger) — avoids double-running
# push+PR for the same SHA. main's ruleset has require-status-checks OFF
# (2026-05-30, VT-245); CI is a non-blocking backstop, the local
# pre-push hook is the safety gate.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # ESLint for the web app.
      - run: pnpm --filter @viabe/team-web lint
      # Lint rule: no-cross-product-env-vars (fails on REPORTS_* env vars).
      - run: node scripts/lint-cross-product-env.mjs
      # VT-253 security: reject committed URL auth-token values (magic-link /
      # OAuth) that gitleaks misses (query-param tokens). From the session-export
      # leak (VT-252). Value-matching, so narrative/elided forms pass.
      - run: bash scripts/check_no_url_tokens.sh
      # Python lint.
      - uses: astral-sh/setup-uv@v7
      - run: uvx ruff check apps/team-orchestrator apps/team-ingestion-worker
      # Pillar 1: the deterministic subtree (Pre-Filter Gate + phase machine)
      # must contain no LLM calls.
      - name: No LLM in the deterministic subtree (Pillar 1)
        run: |
          if grep -rniE 'anthropic|openai|messages\.create|claude-|\bsonnet\b' \
              apps/team-orchestrator/src/orchestrator/pre_filter_gate.py \
              apps/team-orchestrator/src/orchestrator/state/ \
              apps/team-orchestrator/src/orchestrator/transitions.py \
              apps/team-orchestrator/src/orchestrator/invariants.py \
              apps/team-orchestrator/src/orchestrator/runner.py \
              apps/team-orchestrator/src/orchestrator/api/ \
              apps/team-orchestrator/src/orchestrator/direct_handlers/; then
            echo "::error::LLM reference found in the deterministic subtree (Pillar 1)"
            exit 1
          fi
          echo "no-llm-in-deterministic-subtree: ok"
      # Pillar 1: agent / specialist code must never import the phase machine.
      # The dirs do not exist yet (VT-3.4 / VT-3.9); this activates when they land.
      - name: Agent code must not import transitions.py / invariants.py
        run: |
          for d in specialists agent brain; do
            path="apps/team-orchestrator/src/orchestrator/$d"
            if [ -d "$path" ] && grep -rnE '(import|from) .*\b(transitions|invariants)\b' "$path"; then
              echo "::error::agent/specialist code must not import the phase machine (Pillar 1)"
              exit 1
            fi
          done
          echo "agent-cannot-import-phase-machine: ok"

  gate-no-deprecated-langgraph-imports:
    name: gate-no-deprecated-langgraph-imports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Block deprecated create_react_agent import
        run: |
          if grep -rE "from langgraph\.prebuilt import.*create_react_agent" \
              --include="*.py" .; then
            echo "::error::Deprecated import detected. Use langchain.agents.create_agent (CL-134)."
            exit 1
          fi
          echo "No deprecated create_react_agent imports found."

  gate-no-llm-in-deterministic-triggers:
    name: gate-no-llm-in-deterministic-triggers
    runs-on: ubuntu-latest
    # VT-28 Pillar 1 enforcement: the 3 deterministic scheduled triggers
    # (attribution close, day-39 evaluation, monthly impact) MUST NOT
    # invoke any LLM or import any agent / supervisor module. The 4th
    # trigger (weekly cadence) is exempt by design — it owns the
    # reasoning path. Function-body scoped grep mirrors VT-171's
    # gate-no-langsmith-imports pattern.
    steps:
      - uses: actions/checkout@v6
      - name: Forbid LLM references in deterministic trigger + billing bodies
        run: |
          set -euo pipefail
          # VT-175 extends the scan to billing/ modules. Any future
          # deterministic module added here must also stay LLM-free.
          file="apps/team-orchestrator/src/orchestrator/scheduled_triggers.py"
          if [ ! -f "$file" ]; then
            echo "::error::$file missing — VT-28 expected this module on main"
            exit 1
          fi
          # Extract the 3 deterministic trigger bodies + every body in
          # billing/ (whole-file scan for billing — every function in
          # that package is deterministic by Pillar 1).
          python3 - <<'PY'
          import os
          import re
          import sys

          forbidden = re.compile(
              r"(ChatAnthropic|from anthropic|import anthropic|claude-|"
              r"langchain_anthropic|orchestrator_agent|supervisor\b|"
              r"messages\.create|\bllm\b)",
              re.IGNORECASE,
          )

          def _strip_docs_and_comments(text: str) -> str:
              out = []
              in_doc = False
              for line in text.splitlines():
                  s = line.strip()
                  if s.startswith('"""') or s.startswith("'''"):
                      in_doc = not in_doc
                      continue
                  if in_doc:
                      continue
                  if s.startswith("#"):
                      continue
                  out.append(line)
              return "\n".join(out)

          bad: list[str] = []

          # 1. scheduled_triggers.py — VT-28 deterministic-body targets.
          src = open("apps/team-orchestrator/src/orchestrator/scheduled_triggers.py").read()
          targets = (
              "run_attribution_close_body",
              "run_day39_evaluation_body",
              "run_monthly_impact_body",
              "attribution_close_scheduled",
              "day39_evaluation_scheduled",
              "monthly_impact_scheduled",
          )
          for fn in targets:
              m = re.search(rf"^def {fn}\b", src, re.MULTILINE)
              if not m:
                  bad.append(f"function {fn} missing from scheduled_triggers.py")
                  continue
              start = m.start()
              nxt = re.search(r"^def \w+", src[m.end():], re.MULTILINE)
              end = m.end() + nxt.start() if nxt else len(src)
              code = _strip_docs_and_comments(src[start:end])
              for hit in forbidden.finditer(code):
                  bad.append(f"{fn}: forbidden token '{hit.group(0)}' in body")

          # 2. billing/ package — VT-175 extension. Whole-file scan.
          billing_dir = "apps/team-orchestrator/src/orchestrator/billing"
          if not os.path.isdir(billing_dir):
              bad.append(f"directory {billing_dir} missing — VT-175 expected it on main")
          else:
              for name in sorted(os.listdir(billing_dir)):
                  if not name.endswith(".py"):
                      continue
                  path = os.path.join(billing_dir, name)
                  code = _strip_docs_and_comments(open(path).read())
                  for hit in forbidden.finditer(code):
                      bad.append(
                          f"billing/{name}: forbidden token '{hit.group(0)}' in module"
                      )

          # 3. output_composer.py — VT-30 extension. Whole-file scan; the
          # composer is deterministic by spec (Pillar 1) and must stay free
          # of LLM imports.
          composer_path = "apps/team-orchestrator/src/orchestrator/output_composer.py"
          if not os.path.isfile(composer_path):
              bad.append(f"{composer_path} missing — VT-30 expected this module on main")
          else:
              code = _strip_docs_and_comments(open(composer_path).read())
              for hit in forbidden.finditer(code):
                  bad.append(
                      f"output_composer.py: forbidden token '{hit.group(0)}' in module"
                  )

          if bad:
              for entry in bad:
                  print(f"::error::{entry}")
              sys.exit(1)
          print("gate-no-llm-in-deterministic-triggers: ok")
          PY

  gate-no-langsmith-imports:
    name: gate-no-langsmith-imports
    runs-on: ubuntu-latest
    # CL-56 (Standing 2026-05-16): LangSmith is replaced by Pydantic Logfire.
    # VT-171 hot-fix shipped the migration; this gate prevents silent re-
    # introduction. Any new `from langsmith` or `import langsmith` in src/
    # fails the build. Tests, canaries, and docs are exempt (they may
    # reference langsmith historically).
    steps:
      - uses: actions/checkout@v6
      - name: Block langsmith imports under apps/team-orchestrator/src
        run: |
          if grep -rnE '^\s*(from langsmith|import langsmith)\b' \
              --include="*.py" apps/team-orchestrator/src; then
            echo "::error::LangSmith import detected. CL-56 directs Logfire; use orchestrator.observability.logfire (VT-171)."
            exit 1
          fi
          echo "No langsmith imports found in apps/team-orchestrator/src."

  gate-sr-agent-prompt-token-cap:
    name: gate-sr-agent-prompt-token-cap
    runs-on: ubuntu-latest
    # VT-33 (system prompt v1.0) acceptance criterion: the sales_recovery
    # system prompt is capped at 4_000 tokens. A prompt with no size
    # gate is not done — silent prompt bloat is the failure mode this
    # guard exists to catch.
    #
    # Tokenizer: tiktoken cl100k_base (GPT-4 encoding). Anthropic's real
    # tokenizer differs by ±5-10% on English text, but cl100k_base is a
    # close conservative proxy that runs offline (no API key burn in
    # CI). When Anthropic ships a public local tokenizer or we have an
    # API-key-bearing CI workflow, swap to the real count.
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Token cap (4000) on sales_recovery_v1 system prompt
        run: |
          uv run --no-project --with tiktoken python - <<'PY'
          import sys
          import tiktoken
          enc = tiktoken.get_encoding("cl100k_base")
          path = "apps/team-orchestrator/src/orchestrator/agent/prompts/sales_recovery_v1.md"
          text = open(path, encoding="utf-8").read()
          n = len(enc.encode(text))
          print(f"sales_recovery_v1.md tokens (cl100k_base proxy): {n} / 4000")
          if n > 4000:
              print(f"::error::system prompt exceeds 4000-token cap (got {n}) (VT-33)")
              sys.exit(1)
          PY

  gate-vt39-tools-harness-import:
    name: gate-vt39-tools-harness-import
    runs-on: ubuntu-latest
    # VT-39 acceptance criterion: every individual tool's tests import
    # `run_tool_test` so the harness contract is uniformly exercised.
    # Empty today (no tools on main yet — framework lands first); the
    # gate guards future VT-5.x PRs.
    steps:
      - uses: actions/checkout@v6
      - name: Tool tests must import run_tool_test
        run: |
          TOOLS_TEST_DIR=apps/team-orchestrator/tests/orchestrator/agent/tools
          if [ -d "$TOOLS_TEST_DIR" ]; then
            for f in "$TOOLS_TEST_DIR"/test_*.py; do
              [ -f "$f" ] || continue
              if ! grep -qE 'from team_shared\.mcp import .*run_tool_test|from team_shared\.mcp\.test_harness import .*run_tool_test' "$f"; then
                echo "::error::$f must import run_tool_test from team_shared.mcp (VT-39 harness contract)"
                exit 1
              fi
            done
            echo "All tool tests in $TOOLS_TEST_DIR import run_tool_test."
          else
            echo "No tools test dir yet (VT-5.x not landed). Gate passes vacuously."
          fi

  gate-connector-registry-schema:
    name: gate-connector-registry-schema
    runs-on: ubuntu-latest
    # VT-205 acceptance criterion: every entry in the connector
    # registry validates against ConnectorSpec. Schema drift fails
    # CI fast. Re-uses the orchestrator's installed Pydantic; runs
    # against the source tree directly.
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Validate every connector spec
        working-directory: apps/team-orchestrator
        run: |
          uv run --no-project --with pydantic python -c "
          import sys
          sys.path.insert(0, 'src')
          from orchestrator.integrations.registry import REGISTRY
          from orchestrator.integrations.schemas import ConnectorSpec
          drift = []
          for cid, spec in REGISTRY.items():
              try:
                  ConnectorSpec.model_validate(spec.model_dump())
              except Exception as exc:
                  drift.append(f'{cid}: {exc!r}')
          if drift:
              print('::error::connector registry schema drift:')
              for d in drift:
                  print(f'::error::{d}')
              sys.exit(1)
          print(f'Validated {len(REGISTRY)} connector specs.')
          "

  gate-vt35-hard-limit-constants:
    name: gate-vt35-hard-limit-constants
    runs-on: ubuntu-latest
    # VT-35 acceptance criterion: the four hard-limit constants
    # (80_000 / 25 / 8 / 300) are Type 3 commitments. Changing any of
    # them must break the build. This grep gate fails CI on a literal
    # mismatch — bumping a budget is a Type-3-governance decision
    # carrying its own brief, not a quiet code change.
    steps:
      - uses: actions/checkout@v6
      - name: Token budget = 80_000
        run: |
          grep -qE '^_RUN_LEVEL_TOKEN_HARD_LIMIT = 80_000$' \
            apps/team-orchestrator/src/orchestrator/agent/sales_recovery.py \
            || (echo "::error::token hard-limit constant changed (VT-35 Type 3)" && exit 1)
      - name: Tool-call budget = 25
        run: |
          grep -qE '^TOOL_CALL_HARD_LIMIT = 25$' \
            apps/team-orchestrator/src/orchestrator/agent/limits/tool_counter.py \
            || (echo "::error::tool-call hard-limit constant changed (VT-35 Type 3)" && exit 1)
      - name: Depth budget = 8
        run: |
          grep -qE '^DEPTH_HARD_LIMIT = 8$' \
            apps/team-orchestrator/src/orchestrator/agent/limits/depth_tracker.py \
            || (echo "::error::depth hard-limit constant changed (VT-35 Type 3)" && exit 1)
      - name: Wallclock budget = 300.0s
        run: |
          grep -qE '^WALL_CLOCK_HARD_LIMIT_S = 300\.0$' \
            apps/team-orchestrator/src/orchestrator/agent/limits/wallclock_timer.py \
            || (echo "::error::wallclock hard-limit constant changed (VT-35 Type 3)" && exit 1)
          echo "VT-35 hard-limit constants intact: tokens=80_000 tool_calls=25 depth=8 wallclock=300.0s"

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # JS/TS unit tests (repo tooling + workspaces).
      - run: pnpm test
      # team-web route-handler tests (VT-3.3b Twilio webhook).
      - run: pnpm --filter @viabe/team-web test
      # Python unit tests (smoke). Heavy deps are not installed here — tests
      # import only stdlib + the package under test. DB-backed migration tests
      # skip themselves (no psycopg / no DATABASE_URL); they run in `migrations`.
      - uses: astral-sh/setup-uv@v7
      - run: uv run --no-project --with pytest pytest
        working-directory: apps/team-orchestrator
      - run: uv run --no-project --with pytest pytest
        working-directory: apps/team-ingestion-worker
      # team-shared: VT-39 MCP framework lives here; needs pydantic.
      # Uses uv sync (the package owns its dev deps) rather than the
      # stdlib-only smoke pattern.
      - run: uv sync --frozen && uv run pytest -q
        working-directory: packages/team-shared

  e2e-playwright:
    name: e2e-playwright
    runs-on: ubuntu-latest
    # VT-211: Playwright e2e on team-web. Tests that need real auth/Supabase
    # state self-skip via `test.skip(!ENV_VAR, ...)` so this job runs as a
    # lint-grade check today; we light up the full matrix when secrets are
    # provisioned. The single unauth → /login redirect test runs always.
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        working-directory: apps/team-web
        run: pnpm exec playwright install --with-deps chromium
      - name: Build team-web
        working-directory: apps/team-web
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:0
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-publishable-stub
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          # Next.js may freeze module-scope `process.env.X` reads at build
          # time. Provide the same server-side env at build + start so
          # runtime requireFazal can read them.
          INTERNAL_API_SECRET: ci-test-internal-secret
          TEAM_ORCHESTRATOR_URL: http://localhost:8001
          FAZAL_TENANT_ID: 00000000-0000-4000-8000-000000aaaaaa
          FAZAL_OWNER_UUID: 00000000-0000-4000-8000-0000000fa2a1
          OPERATOR_JWT_SECRET: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
        run: pnpm build
      - name: Start team-web dev server (background)
        working-directory: apps/team-web
        env:
          INTERNAL_API_SECRET: ci-test-internal-secret
          TEAM_ORCHESTRATOR_URL: http://localhost:8001
          FAZAL_TENANT_ID: 00000000-0000-4000-8000-000000aaaaaa
          FAZAL_OWNER_UUID: 00000000-0000-4000-8000-0000000fa2a1
          OPERATOR_JWT_SECRET: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:0
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-publishable-stub
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
        run: |
          nohup pnpm start > /tmp/team-web.log 2>&1 &
          # Wait for the server to accept TCP; any HTTP response (incl. 404
          # on bare /) means up. The default Next.js home is not defined for
          # this app — pages are under /team/* — so we cannot use curl -f.
          for i in {1..30}; do
            if curl -s -o /dev/null -w '%{http_code}' http://localhost:3000 | grep -qE '^[1-5][0-9]{2}$'; then
              echo "team-web up"
              exit 0
            fi
            sleep 1
          done
          echo "team-web failed to start"
          cat /tmp/team-web.log
          exit 1
      - name: Run Playwright tests
        working-directory: apps/team-web
        env:
          TEAM_WEB_BASE_URL: http://localhost:3000
          INTERNAL_API_SECRET: ci-test-internal-secret
          TEAM_ORCHESTRATOR_URL: http://localhost:8001
          FAZAL_TENANT_ID: 00000000-0000-4000-8000-000000aaaaaa
          FAZAL_OWNER_UUID: 00000000-0000-4000-8000-0000000fa2a1
          OPERATOR_JWT_SECRET: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
        # VT-211 scope: onboard.spec.ts.
        # VT-201 PR-3 scope: ops-pr3.spec.ts. Both mint operator JWTs
        # inline via the lib/auth/operator-jwt helper so requireFazal()
        # passes without a pre-provisioned cookie.
        run: pnpm exec playwright test tests/e2e/onboard.spec.ts tests/e2e/ops-pr3.spec.ts
      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: apps/team-web/test-results/
          retention-days: 7

  migrations:
    name: migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      # Applies /migrations/ via the runner, then asserts RLS tenant isolation.
      - name: Apply migrations + RLS attack tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
        run: uv run --no-project --with 'psycopg[binary]' --with pytest pytest tests/test_migrations.py
        working-directory: apps/team-orchestrator

  orchestrator:
    name: orchestrator
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      # VT-3.1 DBOS-wrapped LangGraph substrate: DBOS auto-resume, checkpoint
      # RLS, idempotency. Needs the full project (uv sync), not --no-project.
      - name: DBOS + LangGraph + ingress tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
          INTERNAL_API_SECRET: ci-test-internal-secret
          TEAM_PHONE_HASH_SALT: ci-test-phone-hash-salt
          # VT-150-fix-1: integration tests gated on this env var
          # (conftest.py:27 strips the @pytest.mark.integration skip only
          # when set). Without it the four test_dbos_purge_substrate
          # cases skip and the gate is theatre.
          RUN_INTEGRATION_TESTS: "1"
        run: |
          uv sync --frozen
          uv run pytest tests/orchestrator/ -v
        working-directory: apps/team-orchestrator

      # VT-186 gate-envelope-schema-registered: every step_kind=<literal> in
      # source is registered in STEP_KIND_REGISTRY; every @tool_step's
      # step_kind is registered. Runs in the orchestrator job so the
      # full-deps env (psycopg + dbos + pydantic + envelopes) is reused
      # without duplicating CI surface (Q3 Option A locked, Cowork
      # plan-review 2026-05-26).
      - name: gate-envelope-schema-registered (VT-186)
        env:
          VIABE_SKIP_ENVELOPE_REGISTRY_CHECK: "0"
        run: |
          uv run python -c "
          import orchestrator.agent.tools.compose_output  # noqa: F401
          from orchestrator.observability.envelopes import validate_registry_completeness
          from orchestrator.observability.decorators import validate_tool_step_registry
          validate_registry_completeness()
          validate_tool_step_registry()
          print('envelope + tool_step registries clean (VT-186)')
          "
        working-directory: apps/team-orchestrator

  gate-langgraph-nodes-have-observability-hook:
    name: gate-langgraph-nodes-have-observability-hook
    # VT-186 / VT-183: every `graph.add_node(NAME, callable)` call in
    # the orchestrator src tree must wrap the callable with
    # `with_state_transition_hook(...)` OR carry a
    # `# observability:opt-out reason=...` annotation on the line
    # preceding the call (Q1 Option A — Cowork plan-review locked).
    # The annotation pattern preserves the VT-183 CompiledStateGraph
    # exception (orchestrator_agent subgraph rejects function wrappers)
    # and the VT-3.1 placeholder_node (no agent yet).
    #
    # Uses AST so multi-line `add_node(` calls and nested-paren
    # arguments parse correctly. Pure stdlib (no setup-python needed
    # for ast); ubuntu-latest already has python3.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Assert every graph.add_node is hooked or opt-out (AST)
        run: |
          python3 <<'PY'
          import ast, sys
          from pathlib import Path

          OPT_OUT_MARK = "observability:opt-out"
          HOOK_NAME = "with_state_transition_hook"
          ROOT = Path("apps/team-orchestrator/src/orchestrator")
          violations = []

          for path in ROOT.rglob("*.py"):
              source = path.read_text(encoding="utf-8")
              source_lines = source.splitlines()
              try:
                  tree = ast.parse(source, filename=str(path))
              except SyntaxError:
                  continue
              for node in ast.walk(tree):
                  if not isinstance(node, ast.Call):
                      continue
                  func = node.func
                  if not (isinstance(func, ast.Attribute) and func.attr == "add_node"):
                      continue
                  if len(node.args) < 2:
                      continue
                  callable_arg = node.args[1]
                  hooked = (
                      isinstance(callable_arg, ast.Call)
                      and isinstance(callable_arg.func, ast.Name)
                      and callable_arg.func.id == HOOK_NAME
                  )
                  if hooked:
                      continue
                  # Check up to 3 lines preceding the add_node call for an
                  # opt-out annotation.
                  start_line = node.lineno
                  preceding = source_lines[max(0, start_line - 4):start_line - 1]
                  opt_out = any(OPT_OUT_MARK in line for line in preceding)
                  if opt_out:
                      continue
                  violations.append(f"{path}:{start_line}: add_node without hook or opt-out annotation")

          if violations:
              print("::error::LangGraph add_node calls missing observability hook:", file=sys.stderr)
              for v in violations:
                  print(f"  {v}", file=sys.stderr)
              print(
                  "Wrap the callable with `with_state_transition_hook(...)` OR add a "
                  "`# observability:opt-out reason=<text>` comment within 3 lines above "
                  "the call (per VT-186 / VT-183).",
                  file=sys.stderr,
              )
              sys.exit(1)
          print("gate-langgraph-nodes-have-observability-hook: ok")
          PY

  gate-mcp-tools-have-observability-decorator:
    name: gate-mcp-tools-have-observability-decorator
    # VT-186 / VT-181: every langchain `@tool` function in
    # `apps/team-orchestrator/src/orchestrator/agent/tools/` must ALSO
    # be wrapped by `@observability.tool_step` so each invocation writes
    # a pipeline_steps row via VT-180 write_step.
    #
    # VT-190 removed the self_evaluate.py exception: the SelfEvaluateTool
    # (an MCPTool subclass, not a langchain `@tool` — so it never matched
    # the `^@tool$` grep anyway) is now retrofitted via the module-level
    # `_self_evaluate_impl` wrapped by `@observability.tool_step`.
    # If new exceptions accumulate (>2-3), promote to per-tool annotation
    # pattern (Q2 Option B fallback noted in plan-review verdict).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Assert every @tool is @tool_step decorated
        run: |
          set -e
          OFFENDERS=()
          for f in $(grep -lrE '^@tool$' \
              apps/team-orchestrator/src/orchestrator/agent/tools/ \
              --include='*.py' 2>/dev/null); do
            if ! grep -q 'tool_step' "$f"; then
              OFFENDERS+=("$f")
            fi
          done
          if [ ${#OFFENDERS[@]} -ne 0 ]; then
            echo "::error::@tool functions missing @tool_step decoration:"
            printf '  %s\n' "${OFFENDERS[@]}"
            echo "Add @observability.tool_step decorator above @tool, OR"
            echo "extend the exception list with a follow-up VT-N reference."
            exit 1
          fi
          echo "gate-mcp-tools-have-observability-decorator: ok"

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # NOTE: the pr-title gate moved to .github/workflows/pr-title.yml (VT-255)
  # so a title/body `edited` event re-runs ONLY that 1 job, not this suite.

  # Non-blocking (continue-on-error + `|| true`): reports mypy --strict status
  # and uploads logs, but does NOT gate merge. NOT in branch protection's
  # required checks. Re-evaluate gate-or-drop at Sprint 1 end (CL-83).
  mypy:
    name: mypy (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: mypy --strict (apps/team-orchestrator)
        working-directory: apps/team-orchestrator
        run: |
          uv sync --frozen
          uv run --with 'mypy>=1.14' mypy --strict src/ 2>&1 | tee mypy-orchestrator.log || true
      - name: mypy --strict (apps/team-ingestion-worker)
        working-directory: apps/team-ingestion-worker
        # No `uv sync`: the worker's `sarvam-ai-client` dependency is not
        # resolvable on PyPI (pre-existing — flagged for a follow-up). The
        # worker is a stdlib-only scaffold, so mypy needs no project deps.
        run: |
          uv run --no-project --with 'mypy>=1.14' mypy --strict src/ 2>&1 | tee mypy-worker.log || true
      - name: Upload mypy logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-reports
          path: |
            apps/team-orchestrator/mypy-orchestrator.log
            apps/team-ingestion-worker/mypy-worker.log
