# VT-90 / VT-365 — trial-lifecycle tunables (config, not code; tunable without a deploy).
# The evaluator is deterministic + zero-LLM (Pillar 1).
#
# VT-365 (Fazal 2026-06-09): 30-day free trial, NO card in trial, opt-in subscribe at day 30,
# NO auto-charge, NO refund, NO extensions. The trial simply WARNs then EXPIRES to `lapsed`
# (dormant, re-subscribable). The old extension/grace/engagement tunables are removed.

trial_days: 30                  # flat trial length (was 14); no extensions
warn_lead_days: 2               # day-28 warning = trial_end - 2 days (subscribe nudge)
