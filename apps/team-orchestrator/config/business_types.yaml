# VT-82 — business_type taxonomy (PROPOSED; flagged for Cowork/Fazal review).
#
# Signup (#6 field) constrains business_type to this list — NOT free text. It is
# load-bearing: VT-312's brain-decides thresholds are business-type-dependent
# (context_builder reads `SELECT business_type FROM tenants`), L3 cohorts key on
# (business_type, city_tier), and L4 skills tag applies_to_business_types.
#
# DESIGN: kept COARSE on purpose (~14 buckets). L3/k-anon cohorts are keyed on
# (business_type × city_tier); too many categories → tiny cohorts → the k=10 gate
# (CL-28) starves and reports/cohort-matching fail. Coarse buckets keep cohorts
# populated. A new bucket = a Type-2 change (re-cohorting), not a casual add.
#
# NO canonical list existed in the codebase (no enum/config; L4's
# applies_to_business_types was only a field type). This is the proposed seed —
# Cowork/Fazal review the buckets before this locks.
#
# `key` is the machine value stored on tenants.business_type; `label_en`/`label_hi`
# are for the signup form (VT-96).

business_types:
  - {key: kirana,        label_en: "Kirana / grocery store",      label_hi: "किराना / जनरल स्टोर"}
  - {key: restaurant,    label_en: "Restaurant / dhaba",          label_hi: "रेस्टोरेंट / ढाबा"}
