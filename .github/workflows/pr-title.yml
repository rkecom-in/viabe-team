name: pr-title

# VT-255 Actions-diet: the PR-title gate (CL-423 numeric-VT rule) lives in its
# OWN featherweight workflow so a title/body edit re-validates at a 1-job cost
# instead of re-running ci.yml's ~17-job suite. ci.yml dropped `edited` for that
# reason; this workflow keeps it. Path-independent (title check), so no
# paths-ignore — but a single ~3s job, so the cost is negligible.

on:
  pull_request:
    branches: [main]
    types: [opened, edited, reopened]

concurrency:
  group: pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-title:
    name: pr-title
    runs-on: ubuntu-latest
    steps:
      - name: PR title must reference a numeric VT row
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          printf 'PR title: %s\n' "$PR_TITLE"
          # PR title must end with a parenthesised NUMERIC VT reference.
          # Grammar: VT-<N>(-fix-<M>)? where N and M are integers.
          #
          # VT-239 / Fazal 2026-05-30: every PR references a REAL numeric VT
          # row from the file-based allocator (scripts/vt_id_allocate.py).
          # Text-suffix pseudo-parents (VT-Foundation, VT-CI, VT-MCP-Tools,
          # VT-FOO) and dotted legacy subtask IDs (VT-3.3a) are NO LONGER
          # accepted — the Notion auto_increment is gone and all new rows are
          # numeric. See docs/clau/decisions-ledger.md (numeric-VT standing
          # rule, 2026-05-30).
          #
          # Examples:
          #   (VT-43)        — row reference            [pass]
          #   (VT-43-fix-1)  — first fix to that row    [pass]
          #   (VT-Foundation)/(VT-CI)/(VT-FOO)          [fail]
          #   (VT-3.3a)      — legacy dotted subtask    [fail]
          #
          # Regex is POSIX ERE (grep -E): a plain group, not Python's (?:...).
          if ! printf '%s' "$PR_TITLE" | grep -qE '\(VT-[0-9]+(-fix-[0-9]+)?\)$'; then
            echo "::error::PR title must end with a numeric VT ref, e.g. (VT-43) or (VT-43-fix-1) — text suffixes like (VT-Foundation) are rejected (VT-239)"
            exit 1
          fi
