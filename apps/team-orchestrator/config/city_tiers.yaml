# VT-75 — locality coarsening tier map (city → city_tier).
#
# Only the COARSE tier is ever stored/used (Pillar 6/7; the k-anon predicate
# allowlist forbids raw city/locality). tier_1 = the 8 metros (Type-3 LOCKED —
# board approval to change). tier_2 = census-top ~50 (Type-1 — PR-reviewable;
# Fazal signs off the list). Everything else falls through to tier_3 (the most
# conservative bucket). Names are normalized lower/trimmed; variants below map
# to the canonical name BEFORE tier lookup.

tier_1:
  - mumbai
  - delhi
  - bangalore
  - chennai
  - kolkata
  - hyderabad
  - pune
  - ahmedabad

