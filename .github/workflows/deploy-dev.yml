name: Deploy dev

# Triggered on push to main only. No untrusted event payload values
# are interpolated into run: blocks — only repo secrets, which are
# safe per the GitHub Actions security model.

on:
  push:
    branches: [main]
    # VT-245 trigger-diet: don't redeploy dev when a merge touches ONLY
    # docs / sprint substrate / session exports / the ci.yml workflow —
    # none of that changes the deployed apps. paths-ignore skips only
    # when EVERY changed file matches.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.viabe/**'
      - 'cowork_sessions/**'
      - '.github/workflows/ci.yml'

# One deploy at a time per branch — both apps share Supabase; concurrent
# migrations would race.
concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  pre-deploy-checks:
    name: pre-deploy-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @viabe/team-web typecheck
      - run: pnpm --filter @viabe/team-web lint
      - uses: astral-sh/setup-uv@v5
      - run: uvx ruff check apps/team-orchestrator

  deploy-orchestrator:
    name: Deploy orchestrator (Railway)
    needs: pre-deploy-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest
      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
        run: railway up --service "$RAILWAY_SERVICE_ID" --detach

  deploy-team-web:
    name: Deploy team-web (Vercel)
    needs: pre-deploy-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # VT-244-fix-2: the repo is a pnpm monorepo; the Vercel project's
      # install command is `pnpm install --frozen-lockfile`, so `vercel
      # build` needs pnpm on the runner (was failing `sh: 1: pnpm: not
      # found`). Mirror ci.yml's proven setup — pnpm/action-setup reads
      # the packageManager pin (pnpm@10.33.4) from package.json.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # VT-244: amondnet/vercel-action@v25 pins vercel CLI 25.1.0, which
      # Vercel's API now rejects ("requires version 47.2.2 or later").
      # Replaced with the current official CLI flow (pull → build → deploy
      # --prebuilt). Token via env (not ${{ }} in the run block) — GH
      # Actions injection-safe. VERCEL_ORG_ID / VERCEL_PROJECT_ID are read
      # by the CLI automatically from the environment.
      #
      # VT-244-fix-1: run at REPO ROOT, not apps/team-web. The Vercel
      # project `viabe-team-dev` already has Root Directory = apps/team-web
      # configured; setting working-directory: apps/team-web on top of that
      # doubled the path (apps/team-web/apps/team-web/package.json ENOENT).
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm i -g vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

  post-deploy-smoke:
    name: Post-deploy smoke
    needs: [deploy-orchestrator, deploy-team-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Wait for both deploys to settle
        run: sleep 60
      - name: Run dev-env smoke
        env:
          RAILWAY_DEV_URL: ${{ secrets.RAILWAY_DEV_URL }}
          VERCEL_DEV_URL: ${{ secrets.VERCEL_DEV_URL }}
        run: bash scripts/dev-env-smoke.sh
