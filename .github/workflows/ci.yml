name: CI

on:
  pull_request:
    branches: [main]

# Required status checks (branch protection on main): lint, typecheck, test.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # ESLint for the web app.
      - run: pnpm --filter @viabe/team-web lint
      # Lint rule: no-cross-product-env-vars (fails on REPORTS_* env vars).
      - run: node scripts/lint-cross-product-env.mjs
      # Python lint.
      - uses: astral-sh/setup-uv@v5
      - run: uvx ruff check apps/team-orchestrator apps/team-ingestion-worker
      # Pillar 1: the deterministic subtree (Pre-Filter Gate + phase machine)
      # must contain no LLM calls.
      - name: No LLM in the deterministic subtree (Pillar 1)
        run: |
          if grep -rniE 'anthropic|openai|messages\.create|claude-|\bsonnet\b' \
              apps/team-orchestrator/src/orchestrator/pre_filter_gate.py \
              apps/team-orchestrator/src/orchestrator/state/ \
              apps/team-orchestrator/src/orchestrator/transitions.py \
              apps/team-orchestrator/src/orchestrator/invariants.py \
              apps/team-orchestrator/src/orchestrator/runner.py \
              apps/team-orchestrator/src/orchestrator/api/ \
              apps/team-orchestrator/src/orchestrator/direct_handlers/; then
            echo "::error::LLM reference found in the deterministic subtree (Pillar 1)"
            exit 1
          fi
          echo "no-llm-in-deterministic-subtree: ok"
      # Pillar 1: agent / specialist code must never import the phase machine.
      # The dirs do not exist yet (VT-3.4 / VT-3.9); this activates when they land.
      - name: Agent code must not import transitions.py / invariants.py
        run: |
          for d in specialists agent brain; do
            path="apps/team-orchestrator/src/orchestrator/$d"
            if [ -d "$path" ] && grep -rnE '(import|from) .*\b(transitions|invariants)\b' "$path"; then
              echo "::error::agent/specialist code must not import the phase machine (Pillar 1)"
              exit 1
            fi
          done
          echo "agent-cannot-import-phase-machine: ok"

  gate-no-deprecated-langgraph-imports:
    name: gate-no-deprecated-langgraph-imports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block deprecated create_react_agent import
        run: |
          if grep -rE "from langgraph\.prebuilt import.*create_react_agent" \
              --include="*.py" .; then
            echo "::error::Deprecated import detected. Use langchain.agents.create_agent (CL-134)."
            exit 1
          fi
          echo "No deprecated create_react_agent imports found."

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # JS/TS unit tests (repo tooling + workspaces).
      - run: pnpm test
      # team-web route-handler tests (VT-3.3b Twilio webhook).
      - run: pnpm --filter @viabe/team-web test
      # Python unit tests (smoke). Heavy deps are not installed here — tests
      # import only stdlib + the package under test. DB-backed migration tests
      # skip themselves (no psycopg / no DATABASE_URL); they run in `migrations`.
      - uses: astral-sh/setup-uv@v5
      - run: uv run --no-project --with pytest pytest
        working-directory: apps/team-orchestrator
      - run: uv run --no-project --with pytest pytest
        working-directory: apps/team-ingestion-worker

  migrations:
    name: migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      # Applies /migrations/ via the runner, then asserts RLS tenant isolation.
      - name: Apply migrations + RLS attack tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
        run: uv run --no-project --with 'psycopg[binary]' --with pytest pytest tests/test_migrations.py
        working-directory: apps/team-orchestrator

  orchestrator:
    name: orchestrator
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      # VT-3.1 DBOS-wrapped LangGraph substrate: DBOS auto-resume, checkpoint
      # RLS, idempotency. Needs the full project (uv sync), not --no-project.
      - name: DBOS + LangGraph + ingress tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
          INTERNAL_API_SECRET: ci-test-internal-secret
          TEAM_PHONE_HASH_SALT: ci-test-phone-hash-salt
        run: |
          uv sync --frozen
          uv run pytest tests/orchestrator/ -v
        working-directory: apps/team-orchestrator

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pr-title:
    name: pr-title
    runs-on: ubuntu-latest
    steps:
      - name: PR title must reference a Notion task ID
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          printf 'PR title: %s\n' "$PR_TITLE"
          # PR title must end with a parenthesised VT-* reference.
          # Grammar: VT-<parent>(-fix-<N>)?
          #
          # Valid <parent> forms:
          #   - Real subtask ID from ViabeTeam_Sprint (e.g. VT-3.3a, VT-2, VT-122)
          #   - Canonical pseudo-parents for cross-cutting fixes:
          #       VT-CI         — CI config, workflows, gates, lint rules
          #       VT-Foundation — base schema, foundational migrations, base helpers
          #   - No other pseudo-parents without a logged Decision entry.
          #
          # Examples:
          #   (VT-3.3a)             — subtask reference
          #   (VT-3.3a-fix-1)       — first fix to that subtask
          #   (VT-CI-fix-2)         — second CI-track fix
          #   (VT-Foundation-fix-1) — first foundation fix
          #
          # See Clau_Session_Log decision: pseudo-parents lock 2026-05-18.
          # Regex is POSIX ERE (grep -E): a plain group, not Python's (?:...).
          if ! printf '%s' "$PR_TITLE" | grep -qE '\(VT-[0-9A-Za-z][0-9A-Za-z.]*(-fix-[0-9]+)?\)$'; then
            echo "::error::PR title must end with a VT ref, e.g. (VT-3.3a) or (VT-CI-fix-2)"
            exit 1
          fi

  # Non-blocking (continue-on-error + `|| true`): reports mypy --strict status
  # and uploads logs, but does NOT gate merge. NOT in branch protection's
  # required checks. Re-evaluate gate-or-drop at Sprint 1 end (CL-83).
  mypy:
    name: mypy (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: mypy --strict (apps/team-orchestrator)
        working-directory: apps/team-orchestrator
        run: |
          uv sync --frozen
          uv run --with 'mypy>=1.14' mypy --strict src/ 2>&1 | tee mypy-orchestrator.log || true
      - name: mypy --strict (apps/team-ingestion-worker)
        working-directory: apps/team-ingestion-worker
        # No `uv sync`: the worker's `sarvam-ai-client` dependency is not
        # resolvable on PyPI (pre-existing — flagged for a follow-up). The
        # worker is a stdlib-only scaffold, so mypy needs no project deps.
        run: |
          uv run --no-project --with 'mypy>=1.14' mypy --strict src/ 2>&1 | tee mypy-worker.log || true
      - name: Upload mypy logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-reports
          path: |
            apps/team-orchestrator/mypy-orchestrator.log
            apps/team-ingestion-worker/mypy-worker.log
