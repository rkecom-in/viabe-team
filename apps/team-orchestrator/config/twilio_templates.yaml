# twilio_templates.yaml — name -> language -> Twilio Content API content_sid mapping (VT-163).
#
# Pillar 8: template *content* lives in the Twilio Console + the Meta WABA.
# This file is a name->lang->sid lookup only — no copy, no logic.
#
# audience: informational (customer = WhatsApp customer of the business owner;
#           owner = the business owner themselves).
#
# variables: ordered list of positional param names (index i = positional {{i+1}}).
#   Source of truth for variable signatures; sourced from .viabe/templates.md.
#   Machine-readable companion to the human-readable markdown.
#
# languages: lang -> content_sid map. Only 'en' is present until Fazal supplies
#   Hindi SIDs — resolving (name, 'hi') raises UnknownLanguageVariantError until then.
#   Dropping a 'hi' SID is a DATA-ONLY change; no code change required.
#
# agent_selectable: true if the SR agent may propose this template in message_plan.
#   Only templates with agent_selectable: true are returned by approved_template_names().
#   Default (absent) = false (system/compliance/direct-handler invoked only).
#   D5 ruling (Cowork, 2026-05-30): only team_weekly_approval is agent-selectable at Phase 1.
#
# A template with a content_sid of null is the stub-pending-approval path.
# Supported; no entry uses it today.

team_welcome:
  # DEPRECATED (VT-404): superseded by team_welcome2. The old copy said "you'll receive a message
  # when the proposal is ready" — it told a passive owner to WAIT, never opening the 24h window, so
  # onboarding stalled (Sundaram e2e). RETAINED for history/back-compat resolution only — NOT sent
  # by any live path (signup _default_welcome + the `welcome` routing both point at team_welcome2).
  audience: owner            # VT-390: OWNER-facing (signup welcome to the business owner);
                             # was mislabeled 'customer' — variables are owner_name/trial_end_date
  agent_selectable: false
  variables:
    - owner_name
    - trial_end_date
  languages:
    en: HX1b66c0daaa52dc0b8575e50eebadfdd1
    hi: HXf154fc0f582955f65c75b6306662388a

team_welcome2:
  # DEPRECATED (VT-520): Meta approved this as category=MARKETING, so Meta declines delivery to
  # low-engagement/new recipients (error 63049 — "Meta chose not to deliver this marketing message");
  # the owner never got the welcome. The VT-404 "welcome / free trial / reply hi to begin" copy read
  # as marketing to Meta's classifier. Superseded by team_welcome3 (UTILITY category, transactional
  # copy). RETAINED for history/back-compat resolution only — NOT sent by any live path.
  audience: owner
  agent_selectable: false
  variables:
    - owner_name
    - trial_end_date
  languages:
    en: HX65602e94b48bb2d6e82c70630d01da20
    hi: HXa2e1bcb65189ed25ec1f6b92d9458108

team_welcome3:
  # DEPRECATED (VT-555): Meta force-converted this template from UTILITY to MARKETING after approval,
  # so it would be declined the same way team_welcome2 was (63049). Superseded by team_welcome4 (a
  # strictly-transactional UTILITY quick-reply — the trial/date wording that read promotional is gone).
  # RETAINED for history/back-compat resolution only — NOT sent by any live path. The appeal path was
  # dropped in favour of the fresh template (Fazal 2026-07-02).
  audience: owner
  agent_selectable: false
  variables:
    - owner_name
    - trial_end_date
  languages:
    en: HX3ec52f76cf477cebf80b3eff5835817e
    hi: HX1ee2cb5bb504137ff8be5071ee9b7799

team_welcome4:
  # VT-555: replaces team_welcome3 (Meta force-converted that UTILITY→MARKETING). Strictly-transactional
  # UTILITY quick-reply — leads with the account-created FACT + a "Complete Setup" button; NO free/trial
  # wording, NO "welcome"-brand greeting (exactly what the auto-classifier flags MARKETING), no offer.
  # ONE variable {{1}} = owner name (the trial-date {{2}} var is DROPPED — the send path passes name
  # only). Quick-reply button id COMPLETE_SETUP (SAME id both langs) = the welcome→onboarding continue-
  # trigger; the onboarding journey lazy-starts on the button tap (Body = title) OR any typed reply, so
  # both continue setup. Created + submitted category=UTILITY 2026-07-02 via the Content API
  # (canaries/vt555_welcome4_create.py); Meta approval is ASYNC (status=received at submit) — delivery
  # works once Meta approves. _default_welcome + the `welcome` routing both point here.
  audience: owner
  agent_selectable: false
  variables:
    - owner_name
  languages:
    en: HXc8188616b2e97b557f4c7330157c4f8f
    hi: HXd8a8d5945c79c75d373d9c24edd4b183
    # hing = hi-Latn (Roman-script Hindi) registered under Meta language=en as a separate content
    # object (Meta has no hi-Latn language code). Fazal-created 2026-07-18 (O5); Meta approval
    # ASYNC — the hinglish welcome ROUTING flips to this only on Fazal's approved-confirmation.
    # Template-whitelist ruling (Fazal 2026-07-18): owner-facing template surface is MINIMAL —
    # auth OTP (Twilio-handled) + welcome + wake-up/re-engage. Everything else rides the 24h
    # session (queued owner-comms, idle-pace delivery) — no hing variants for weekly_approval/
    # monthly_report/draft_approval, by design.
    hing: HX7097590ccf0e901d893f78d9a9224e92

team_wakeup:
  # DEPRECATED same-day (2026-07-18): Meta FORCE-CONVERTED all three langs UTILITY→MARKETING
  # (the welcome2/3 class — "updates ready / available to continue / where we left off" reads as
  # re-engagement marketing to the classifier; MARKETING = silent 63049 frequency-capping, dead
  # for a daily loop). Superseded by team_wakeup2 (account-fact framing). NEVER send.
  audience: owner
  agent_selectable: false
  variables:
    - owner_name
  languages:
    en: HXd6c8cb1300e1d1aaf033fb449f138a7e
    hi: HX26d778c5fdf6a02528b88b9f53f1b171
    hing: HX08b861987d462ef9f7405a0257199dc1

team_wakeup2:
  # VT-683 — the daily wake-up (v2, Fazal-created 2026-07-18). Replaces team_wakeup after the
  # Meta MARKETING force-conversion: leads with an ACCOUNT FACT ("{{2}} item(s) waiting for your
  # review" — DB-backed queue count; the VT-683 loop only sends when the queue is non-empty, so
  # the count is honest by construction) + one Review action — the welcome4 UTILITY playbook.
  # One of the THREE whitelisted owner templates (OTP Twilio-handled / welcome4 / wakeup2);
  # everything else rides the 24h session (Fazal ruling 2026-07-18). Button payload: confirm
  # with Fazal at P3 wiring (any typed reply ALSO opens the session — payload is a convenience,
  # not a dependency). hing = Roman-script Hindi under Meta language=en.
  # Send rules (VT-683 P3): session CLOSED ∧ queue non-empty ∧ ≤1/day ∧ owner hours IST.
  audience: owner
  agent_selectable: false
  variables:
    - owner_name
    - pending_count
  languages:
    en: HXaedb9a8bff0163bd4c162c90cd05bc45
    hi: HXb2dd5579ea46c2715397f2e274ec533c
    hing: HXd2bfed18f25eb8c2319ccca9b22f5d35

onboarding_confirm_yesno:
  # VT-479: an INTERACTIVE quick-reply Content object (twilio/quick-reply, Yes/No/Skip buttons) the
  # onboarding journey sends IN-SESSION (≤24h window) so a confirm question is a tappable button, not
  # a free-text "yes" parse. NOT a Meta-approved 24h-window template — in-session interactive content
  # needs NO Meta approval (≤3 buttons); the HX is a Twilio Content-API registration only. Variable
  # {{1}} = the confirm question text. Button `id` payloads: confirm_yes / confirm_no / confirm_skip
  # (a tap echoes the button TITLE back as the inbound Body — there is no ButtonPayload reader;
  # handle_reply matches the title against its _YES/_NO/_SKIP token sets). Sent via
  # send_interactive_message, NOT send_template_message. OWNER-facing (onboarding).
  audience: owner
  agent_selectable: false
  variables:
    - question_text
  languages:
    en: HX60ace8008b02439ca0db444dee6327d2

team_signup_consent_buttons:
  # VT-691 (Fazal 2026-07-22): the WhatsApp-signup consent ask as an IN-SESSION interactive
  # quick-reply — the signup does NOT start unless the person explicitly presses "I agree";
  # "I do not agree" is the explicit refusal path (DPDP/EU). Static bilingual body (no vars),
  # links to the real notice pages. NOT Meta-approved — in-session interactive registration
  # only (canary canaries/vt691_consent_buttons_create.py). The button TITLE echoes back as
  # the inbound Body; whatsapp_signup's grant set is the EXACT-normalized title ("i agree") —
  # the consent GRANT is fully deterministic (no LLM in the grant path). NEVER change a title
  # without updating _AGREE_TITLE/_DISAGREE_TITLE in onboarding/whatsapp_signup.py in the
  # same commit. Button ids: consent_agree / consent_disagree.
  audience: owner
  agent_selectable: false
  variables: []
  languages:
    en: HXa81bc34018ba6e4349622962b6235f06

team_approval_buttons:
  # VT-683 P2c: the IN-SESSION interactive approval ask (twilio/quick-reply, two decision buttons).
  # When the owner's 24h session is open, arm_pause_request sends THIS via send_interactive_message
  # instead of the Meta approval template (the template stays as the out-of-window belt until
  # P3 wake-up + P4 whitelist retire it). NOT Meta-approved — in-session interactive content needs
  # no Meta approval; the HX is a Twilio Content-API registration only (canary
  # canaries/vt683_approval_buttons_create.py). Variable {{1}} = the PII-safe approval ask text.
  # LOAD-BEARING BUTTON CONTRACT: a tap echoes the button TITLE back as the inbound Body, which
  # try_resume_pending_approval classifies deterministically (classify_approval_reply) against the
  # SAME open pending_approvals row the arm wrote. Titles are verified against the token sets:
  #   en "Yes, approve" -> approved · "No, reject" -> rejected
  #   hi "हाँ, मंज़ूर है" -> approved · "नहीं, रहने दो" -> rejected
  # None collides with the opt-out/DSR guard; none is weak-ack-only. NEVER change a title without
  # re-verifying classify_approval_reply + matches_opt_out_or_dsr on the new text.
  # Button `id` payloads: approval_yes / approval_no (stable, same both langs).
  audience: owner
  agent_selectable: false
  variables:
    - approval_ask_text
  languages:
    en: HX6b8aa56b3497301f86152983686064d7
    hi: HX3b0f0c7926f557e4de1d007682cdaabe

