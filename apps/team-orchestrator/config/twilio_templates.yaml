# twilio_templates.yaml — name -> language -> Twilio Content API content_sid mapping (VT-163).
#
# Pillar 8: template *content* lives in the Twilio Console + the Meta WABA.
# This file is a name->lang->sid lookup only — no copy, no logic.
#
# audience: informational (customer = WhatsApp customer of the business owner;
#           owner = the business owner themselves).
#
# variables: ordered list of positional param names (index i = positional {{i+1}}).
#   Source of truth for variable signatures; sourced from .viabe/templates.md.
#   Machine-readable companion to the human-readable markdown.
#
# languages: lang -> content_sid map. Only 'en' is present until Fazal supplies
#   Hindi SIDs — resolving (name, 'hi') raises UnknownLanguageVariantError until then.
#   Dropping a 'hi' SID is a DATA-ONLY change; no code change required.
#
# agent_selectable: true if the SR agent may propose this template in message_plan.
#   Only templates with agent_selectable: true are returned by approved_template_names().
#   Default (absent) = false (system/compliance/direct-handler invoked only).
#   D5 ruling (Cowork, 2026-05-30): only team_weekly_approval is agent-selectable at Phase 1.
#
# A template with a content_sid of null is the stub-pending-approval path.
# Supported; no entry uses it today.

team_welcome:
  audience: customer
  agent_selectable: false
  variables:
    - owner_name
    - trial_end_date
  languages:
    en: HX1b66c0daaa52dc0b8575e50eebadfdd1
    hi: HXf154fc0f582955f65c75b6306662388a

