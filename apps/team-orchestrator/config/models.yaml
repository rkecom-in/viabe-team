# Model configuration (VT-32).
#
# Selection is environment-driven (env var ``VIABE_ENV``):
#   - production            -> ``production`` model
#   - test / dev / canary   -> ``test`` model
#
# Resolver: ``orchestrator.agent.sales_recovery._resolve_model``.
#
# Rationale (CL-242):
# - Haiku (claude-haiku-4-5) is fast and cheap — fine for plumbing-level
#   canary / dev runs that prove the SDK loop wiring.
# - Opus (claude-opus-4-7) is the production model. Hard-limit behaviour
#   validation (VT-35) MUST run on Opus; do NOT let Haiku leak into that
#   path — the budgets and step-count behaviour differ between models and
#   we calibrate against Opus.
#
# Adding an agent: top-level key is the agent name (string). Both
# ``production`` and ``test`` are required.

sales_recovery:
  production: claude-opus-4-7
  test: claude-haiku-4-5

# VT-50 self_evaluate MCP tool — Opus-backed quality gate. The model
# pin is read by orchestrator.agent.tools.self_evaluate._resolve_self_evaluate_model.
# Production MUST stay Opus per the LLM-backed rationale (false-negative
# blast radius); demoting to Sonnet/Haiku is Type 2 governance and
# requires a measured failure-rate study.
self_evaluate:
  production: claude-opus-4-7
  test: claude-haiku-4-5

# VT-146 owner_input_classifier — Haiku in BOTH slots. Structured
# extraction (message text -> intent/segment/occasion) is deterministic
# classification work, not open-ended reasoning, so the per-slot
# production/test split collapses to a single model. Resolver:
# orchestrator.owner_inputs.writer._resolve_classifier_model.
owner_input_classifier:
  production: claude-haiku-4-5
  test: claude-haiku-4-5

# VT-52 vision_extraction — shared Vision-LLM primitive (VT-6.1). Production =
# Sonnet 4.6 (the VT-52 row's explicit pin — a specific override of the CL-248
# Opus default; Opus is overkill for OCR-style extraction, Sonnet is the vision
# $/quality sweet-spot). Canary/iteration = Haiku 4.5 (CL-274 two-mode + CL-248
# cheap dev runs). Resolver: vision_extraction._resolve_vision_model.
vision_extraction:
  production: claude-sonnet-4-6
  test: claude-haiku-4-5

# VT-63 owner_typed_extraction — Method 9 owner-typed NL entries (WhatsApp).
# Haiku in BOTH slots: extracting {name, phone, amount, date} from a short owner
# message is structured extraction, not open-ended reasoning (same posture as
# owner_input_classifier). Resolver: methods.owner_typed._resolve_owner_typed_model.
owner_typed_extraction:
  production: claude-haiku-4-5
  test: claude-haiku-4-5

# VT-59 voice_transcription — Sarvam Indic ASR for cash-book voice notes. NOT a
# Claude model: this is Sarvam's STT model id (India residency, DPDP-favorable,
# CL-422). saarika:v2.5 is the current/valid model (saarika:v2 was deprecated →
# HTTP 400, caught by the VT-278 live canary). Resolver:
# voice_transcription._resolve_model. Key = SARVAM_API_KEY (.viabe/secrets/sarvam.env).
voice_transcription:
  production: saarika:v2.5
  test: saarika:v2.5

# VT-59 cash_book_merge — Sonnet multimodal reconcile of photo entries vs voice
# narration (the both-inputs path). Sonnet 4.6 (vision $/quality sweet-spot, same
# as vision_extraction); Haiku canary. Resolver: methods.cash_book._resolve_merge_model.
cash_book_merge:
  production: claude-sonnet-4-6
  test: claude-haiku-4-5

# VT-61 zomato_theme_extraction — cluster IDENTITY-STRIPPED public review text into
# ABSTRACT theme labels (e.g. "slow delivery", "great biryani") — NEVER verbatim
# quotes. Haiku both slots (theme clustering = classification, not reasoning).
# Resolver: methods.apify_food._resolve_theme_model. Gated on owner_inputs (CL-390).
zomato_theme_extraction:
  production: claude-haiku-4-5
  test: claude-haiku-4-5

# VT-267 PR-B method_selector — ranks which record-keeping method to suggest first
# to an owner during onboarding (paper_book/contacts/upi/kot_pos/cash_book/owner_typed;
# scrape methods gbp/swiggy/zomato EXCLUDED). Haiku BOTH slots: picking a method from a
# fixed candidate set given tenant context is classification, not open-ended reasoning
# (same posture as owner_input_classifier / owner_typed_extraction). Resolver:
# orchestrator.first_data_step.method_selector._resolve_method_selector_model.
method_selector:
  production: claude-haiku-4-5
  test: claude-haiku-4-5

# VT-368 business_plan — Gap-4 spine generator (proactive business summary + 6-month
# roadmap, grounded on the frozen fact bundle). Production = Sonnet 4.6: grounded
# bilingual long-form generation with strict per-sentence citation discipline — above
# Haiku's reliability band, below the Opus bar (the output is citation-validated and
# degrade-templated, so the false-negative blast radius is bounded). Test = Haiku 4.5
# (cheap canary/dev runs). Resolver: orchestrator.business_plan.generator._resolve_plan_model.
business_plan:
  production: claude-sonnet-4-6
  test: claude-haiku-4-5
